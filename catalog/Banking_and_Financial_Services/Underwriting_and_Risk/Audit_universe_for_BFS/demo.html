            <div style={{display:"grid",gridTemplateColumns:"60px 1fr 70px 70px 80px 60px 70px 60px 70px",gap:0,width:"100%",alignItems:"center",fontSize:10}}>

          <div style={{textAlign:"right",marginRight:4}}><div style={{fontSize:14,fontWeight:700,color:K.tx}}>{g.score}</div><div style={{fontSize:7,color:K.fnt}}>{g.mje} MJE | {g.volume} vol</div></div>

      {sub==="Controls"&&<Pnl>

        <G c="repeat(5,1fr)" s={{marginTop:12}}>{ctrlD.slice(0,5).map(function(c){return <div key={c.domain} style={{padding:10,borderRadius:8,border:"1px solid #f1f3f5",background:"#fafbfc"}}><div style={{fontSize:9,color:K.dim,marginBottom:4}}>{c.domain}</div><div style={{fontSize:18,fontWeight:700,color:c.eff>=80?K.grn:c.eff>=60?K.amb:K.red}}>{c.eff}%</div><div style={{fontSize:8,color:K.fnt}}>effectiveness</div><Prog pct={c.eff} h={3}/></div>;})}</G>
      </Pnl>}

      {sub==="Risk Trend"&&<Pnl>
        <Hdr icon={TrendingUp} t="Predictive Risk Trend" sub="12-month risk score with coverage overlay" ac={K.vio}/>
        <ResponsiveContainer width="100%" height={320}><AreaChart data={tsd}><defs><linearGradient id="grad_risk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={K.vio} stopOpacity={0.15}/><stop offset="100%" stopColor={K.vio} stopOpacity={0}/></linearGradient><linearGradient id="grad_cov" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={K.grn} stopOpacity={0.1}/><stop offset="100%" stopColor={K.grn} stopOpacity={0}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke="#f1f3f5"/><XAxis dataKey="month" tick={{fill:K.dim,fontSize:9}} axisLine={false} tickLine={false}/><YAxis tick={{fill:K.dim,fontSize:9}} axisLine={false} tickLine={false}/><Tooltip contentStyle={tt}/><Area type="monotone" dataKey="risk" stroke={K.vio} fill="url(#grad_risk)" strokeWidth={2} name="Risk Score"/><Area type="monotone" dataKey="cov" stroke={K.grn} fill="url(#grad_cov)" strokeWidth={2} name="Coverage %"/><Legend wrapperStyle={{fontSize:9,color:K.dim}}/></AreaChart></ResponsiveContainer>
      </Pnl>}

      <DetailPanel open={!!selB} title={"Branch: "+((selB||{}).name||"")} onClose={function(){setSelBranch(null);}}>
        {selB&&<F g={12}><div style={{padding:12,borderRadius:8,background:((selB.risk>=80?K.red:selB.risk>=60?K.amb:K.grn)+"08"),border:"1px solid "+((selB.risk>=80?K.red:selB.risk>=60?K.amb:K.grn)+"22")}}><div style={{fontSize:10,color:K.dim}}>Composite Risk Score</div><div style={{fontSize:32,fontWeight:700,color:selB.risk>=80?K.red:selB.risk>=60?K.amb:K.grn}}>{selB.risk}<span style={{fontSize:12,color:K.fnt}}> / 100</span></div></div>
          <G c="1fr 1fr" g={8}>{[["Region",selB.region],["Staff",selB.staffCount],["Last Audit",selB.lastAudit],["Anomalies",selB.anom],["Controls Pass",selB.passCtrl],["Controls Fail",selB.failCtrl],["Cash Variance",selB.cashVar+"%"],["Overrides",selB.overrides]].map(function(r){return <div key={r[0]} style={{padding:8,borderRadius:6,background:"#f8f9fc"}}><div style={{fontSize:8,color:K.fnt}}>{r[0]}</div><div style={{fontSize:14,fontWeight:600,color:K.tx}}>{r[1]}</div></div>;})}</G>
          <div style={{fontSize:11,fontWeight:600,color:K.tx,marginTop:4}}>Recommended Actions</div>
          <F g={4}>{["Review high-frequency overrides","Investigate cash variance trend","Validate user access permissions","Schedule thematic audit visit","Update risk assessment"].map(function(a,i){return <div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:K.tx2}}><CheckCircle size={12} color={i<2?K.grn:K.fnt}/>{a}</div>;})}</F>
        </F>}
      </DetailPanel>

      <DetailPanel open={!!selG} title={"GL: "+((selG||{}).gl||"")+" - "+((selG||{}).name||"")} onClose={function(){setSelGL(null);}}>
        {selG&&<F g={12}><div style={{padding:12,borderRadius:8,background:SC(selG.lvl)+"08",border:"1px solid "+SC(selG.lvl)+"22"}}><div style={{fontSize:10,color:K.dim}}>Anomaly Score</div><div style={{fontSize:32,fontWeight:700,color:SC(selG.lvl)}}>{selG.score}</div><Prog pct={selG.score}/></div>
          <G c="1fr 1fr" g={8}>{[["Domain",selG.dom],["Risk Level",selG.lvl],["MJE Count",selG.mje],["Volume",selG.volume],["Recon Breaks",selG.reconBreaks],["Owner",selG.owner]].map(function(r){return <div key={r[0]} style={{padding:8,borderRadius:6,background:"#f8f9fc"}}><div style={{fontSize:8,color:K.fnt}}>{r[0]}</div><div style={{fontSize:13,fontWeight:600,color:K.tx}}>{r[1]}</div></div>;})}</G>
        </F>}
      </DetailPanel>
    </F>
  );
}

/* ═══════════════════ TAB 2: REACTIVE ═══════════════════ */
function ReactiveTab(){
  var _f=useState("All"),filter=_f[0],setFilter=_f[1];
  var _sel=useState(null),selAlert=_sel[0],setSelAlert=_sel[1];
  var _sub=useState("Alerts"),sub=_sub[0],setSub=_sub[1];
  var _q=useState(""),q=_q[0],setQ=_q[1];
  var sc=useMemo(function(){var m={Critical:0,High:0,Medium:0,Low:0};alerts.forEach(function(a){m[a.sev]++;});return m;},[]);
  var list=useMemo(function(){var f=filter==="All"?alerts:alerts.filter(function(a){return a.sev===filter;});if(q){var ql=q.toLowerCase();f=f.filter(function(a){return a.title.toLowerCase().indexOf(ql)>=0||a.id.toLowerCase().indexOf(ql)>=0||a.dom.toLowerCase().indexOf(ql)>=0;});}return f;},[filter,q]);
  var ss=[{name:"Open",value:alerts.filter(function(a){return a.stat==="Open";}).length,color:K.red},{name:"Investigating",value:alerts.filter(function(a){return a.stat==="Investigating";}).length,color:K.amb},{name:"Escalated",value:alerts.filter(function(a){return a.stat==="Escalated";}).length,color:K.org},{name:"Resolved",value:alerts.filter(function(a){return a.stat==="Resolved";}).length,color:K.grn}];
  var selA=selAlert?alerts.find(function(a){return a.id===selAlert;}):null;

  return(
    <F>
      <G c="repeat(4,1fr)"><Kpi icon={Bell} l="Active Alerts" v={alerts.filter(function(a){return a.stat!=="Resolved";}).length} ac={K.red}/><Kpi icon={Clock} l="Avg Resolution" v="6.4h" sub="target <8h" tr={-15} ac={K.amb}/><Kpi icon={AlertTriangle} l="Critical Open" v={sc.Critical} ac={K.ros}/><Kpi icon={CheckCircle} l="SLA Compliance" v="91%" tr={5} ac={K.grn}/></G>
      <SubTab tabs={["Alerts","Investigation","Analytics"]} active={sub} onChange={setSub} ac={K.red}/>

      {sub==="Alerts"&&<G c="2fr 1fr">
        <Pnl>
          <Hdr icon={Bell} t="Alert Command Center" ac={K.red} mb={8} right={<SearchBar value={q} onChange={setQ} ph="Search alerts..." w={200}/>}/>
          <div style={{display:"flex",gap:3,marginBottom:10}}>{["All","Critical","High","Medium","Low"].map(function(s){return <Btn key={s} onClick={function(){setFilter(s);}} active={filter===s} ac={K.red}>{s}{s!=="All"?" ("+sc[s]+")":""}</Btn>;})}</div>
          <div style={{maxHeight:420,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>{list.map(function(a){return <TblRow key={a.id} sel={selAlert===a.id} onClick={function(){setSelAlert(a.id);}}>
            <Dot c={StC(a.stat)}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:11,color:K.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:selAlert===a.id?600:400}}>{a.title}</div><div style={{display:"flex",alignItems:"center",gap:5,marginTop:2}}><span style={{fontSize:8,fontFamily:"monospace",color:K.fnt}}>{a.id}</span><span style={{fontSize:8,padding:"0 5px",borderRadius:3,background:"#f3f4f6",color:K.dim}}>{a.dom}</span><span style={{fontSize:8,color:K.fnt}}>{a.stat}</span></div></div>
            <div style={{textAlign:"right",marginRight:6}}><div style={{fontSize:9,color:K.fnt}}>{a.age}h</div><div style={{fontSize:8,color:K.fnt}}>{a.team}</div></div><Bdg l={a.sev} c={SC(a.sev)}/>
          </TblRow>;})}</div>
        </Pnl>
        <F g={12}>
          <Pnl><Hdr icon={Activity} t="Status Distribution" ac={K.amb}/><ResponsiveContainer width="100%" height={160}><PieChart><Pie data={ss} cx="50%" cy="50%" innerRadius={42} outerRadius={68} dataKey="value" stroke="none">{ss.map(function(s,i){return <Cell key={i} fill={s.color}/>;})}</Pie><Tooltip contentStyle={tt}/></PieChart></ResponsiveContainer><div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginTop:4}}>{ss.map(function(s){return <div key={s.name} style={{display:"flex",alignItems:"center",gap:4}}><Dot c={s.color}/><span style={{fontSize:8,color:K.dim}}>{s.name} ({s.value})</span></div>;})}</div></Pnl>
          <Pnl><Hdr icon={Search} t="RCA Summary" ac={K.cyn}/><F g={6}>{[{t:"Control Failure",p:32,c:K.red},{t:"Policy Violation",p:24,c:K.amb},{t:"Anomalous Pattern",p:44,c:K.vio}].map(function(r){return <div key={r.t}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:10,color:K.tx2}}>{r.t}</span><span style={{fontSize:12,fontWeight:700,color:r.c}}>{r.p}%</span></div><Prog pct={r.p} c={r.c} h={4}/></div>;})}</F></Pnl>
        </F>
      </G>}

      {sub==="Investigation"&&<Pnl>
        <Hdr icon={FileText} t="Investigation Workbench" sub="Select an alert to view full investigation details" ac={K.vio}/>
        {selA?<G c="1fr 1fr" g={16}><div><div style={{fontSize:12,fontWeight:700,color:K.tx,marginBottom:8}}>{selA.title}</div><G c="1fr 1fr" g={6}>{[["Alert ID",selA.id],["Severity",selA.sev],["Status",selA.stat],["Domain",selA.dom],["Age",selA.age+"h"],["Team",selA.team],["Impact",selA.impact],["Created",selA.created]].map(function(r){return <div key={r[0]} style={{padding:8,borderRadius:6,background:"#f8f9fc"}}><div style={{fontSize:8,color:K.fnt}}>{r[0]}</div><div style={{fontSize:12,fontWeight:600,color:K.tx}}>{r[1]}</div></div>;})}</G><div style={{marginTop:12}}><div style={{fontSize:10,fontWeight:600,color:K.dim,marginBottom:6}}>Description</div><div style={{fontSize:11,color:K.tx2,lineHeight:1.6}}>{selA.desc}</div></div></div>
          <div><div style={{fontSize:10,fontWeight:600,color:K.dim,marginBottom:8}}>Investigation Checklist</div><F g={6}>{selA.actions.map(function(a,i){return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:7,border:"1px solid #f1f3f5",background:"#fafbfc"}}><CheckCircle size={14} color={i<2?K.grn:K.fnt}/><span style={{fontSize:10,color:i<2?K.tx:K.dim,textDecoration:i<2?"line-through":"none"}}>{a}</span></div>;})}</F><div style={{marginTop:12,padding:12,borderRadius:8,background:K.blu+"08",border:"1px solid "+K.blu+"22"}}><div style={{fontSize:10,fontWeight:600,color:K.blu,marginBottom:4}}>AI Recommendation</div><div style={{fontSize:10,color:K.tx2}}>Based on pattern analysis, this alert correlates with 3 similar incidents in {selA.dom}. Recommend reviewing access logs and recent policy changes.</div></div></div>
        </G>:<div style={{padding:40,textAlign:"center",color:K.fnt}}><Search size={24} color={K.fnt2} style={{marginBottom:8}}/><div style={{fontSize:12}}>Select an alert from the Alerts tab to begin investigation</div></div>}
      </Pnl>}

      {sub==="Analytics"&&<G c="1fr 1fr"><Pnl><Hdr icon={BarChart3} t="Alert Volume Trend" ac={K.blu}/><ResponsiveContainer width="100%" height={240}><BarChart data={tsd}><CartesianGrid strokeDasharray="3 3" stroke="#f1f3f5"/><XAxis dataKey="month" tick={{fill:K.dim,fontSize:9}} axisLine={false} tickLine={false}/><YAxis tick={{fill:K.dim,fontSize:9}} axisLine={false} tickLine={false}/><Tooltip contentStyle={tt}/><Bar dataKey="findings" fill={K.blu} radius={[3,3,0,0]} name="Alerts"/></BarChart></ResponsiveContainer></Pnl>
        <Pnl><Hdr icon={Layers} t="Domain Heatmap" ac={K.vio}/><F g={5}>{DOMS.map(function(d,i){var v=sd(i,2,8);return <div key={d} style={{display:"flex",alignItems:"center",gap:6}}><Dot c={DH[d]}/><span style={{fontSize:9,color:K.dim,width:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d}</span><div style={{flex:1}}><Prog pct={v*12} c={DH[d]}/></div><span style={{fontSize:10,fontWeight:600,color:K.tx2,width:16,textAlign:"right"}}>{v}</span></div>;})}</F></Pnl>
      </G>}

      <DetailPanel open={!!selA&&sub==="Alerts"} title={"Alert: "+((selA||{}).id||"")} onClose={function(){setSelAlert(null);}}>
        {selA&&<F g={10}><div style={{padding:10,borderRadius:8,background:SC(selA.sev)+"08"}}><div style={{fontSize:10,color:K.dim}}>Severity</div><div style={{fontSize:20,fontWeight:700,color:SC(selA.sev)}}>{selA.sev}</div></div>
          <div style={{fontSize:12,fontWeight:600,color:K.tx}}>{selA.title}</div>
          <div style={{fontSize:10,color:K.tx2,lineHeight:1.6}}>{selA.desc}</div>
          <G c="1fr 1fr" g={6}>{[["Status",selA.stat],["Domain",selA.dom],["Age",selA.age+"h"],["Team",selA.team],["Impact",selA.impact],["Created",selA.created]].map(function(r){return <div key={r[0]} style={{padding:8,borderRadius:6,background:"#f8f9fc"}}><div style={{fontSize:8,color:K.fnt}}>{r[0]}</div><div style={{fontSize:12,fontWeight:600,color:K.tx}}>{r[1]}</div></div>;})}</G>
          <div style={{fontSize:10,fontWeight:600,color:K.dim}}>Investigation Steps</div>
          <F g={4}>{selA.actions.map(function(a,i){return <div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:K.tx2}}><div style={{width:18,height:18,borderRadius:4,border:"1.5px solid "+(i<2?K.grn:K.border),display:"flex",alignItems:"center",justifyContent:"center"}}>{i<2&&<CheckCircle size={12} color={K.grn}/>}</div>{a}</div>;})}</F>
        </F>}
      </DetailPanel>
    </F>
  );
}

/* ═══════════════════ TAB 3: FEEDBACK ═══════════════════ */
function FeedbackTab(){
  var _sub=useState("Trends"),sub=_sub[0],setSub=_sub[1];

  var selModel=selM!=null?models[selM]:null;

        <Pnl><Hdr icon={CheckCircle} t="Control Effectiveness" ac={K.grn}/><ResponsiveContainer width="100%" height={280}><BarChart data={ctrlD} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke="#f1f3f5"/><XAxis type="number" tick={{fill:K.dim,fontSize:9}} axisLine={false} tickLine={false} domain={[0,100]}/><YAxis type="category" dataKey="domain" tick={{fill:K.dim,fontSize:8}} axisLine={false} tickLine={false} width={88}/><Tooltip contentStyle={tt}/><Bar dataKey="eff" fill={K.grn} radius={[0,4,4,0]} name="Effectiveness %"/></BarChart></ResponsiveContainer></Pnl>
      </G>}

      {sub==="Models"&&<Pnl>
        <Hdr icon={Cpu} t="ML Model Registry" sub="Click any model for full details" ac={K.amb}/>
        <div style={{display:"grid",gridTemplateColumns:"2fr 60px 60px 60px 60px 60px 70px 70px 50px",fontSize:9,fontWeight:600,color:K.dim,padding:"0 10px 8px",borderBottom:"1px solid #f1f3f5"}}><span>Model</span><span>Acc</span><span>Prec</span><span>Rec</span><span>F1</span><span>Drift</span><span>Type</span><span>Freq</span><span>Health</span></div>

            <span style={{fontWeight:600,color:K.tx}}>{m.n}</span>
            <span>{m.acc}%</span><span>{m.pr}%</span><span>{m.rc}%</span><span>{m.f1}%</span>
            <span style={{color:hc,fontWeight:600}}>{m.dr.toFixed(3)}</span>
            <span style={{color:K.dim}}>{m.type}</span><span style={{color:K.dim}}>{m.freq}</span>
            <Bdg l={m.ok?"OK":m.dr>0.04?"Warn":"Watch"} c={hc}/>

                  </div>
                </div>
                <div style={{fontSize:10,color:K.tx2,lineHeight:1.5,marginBottom:6}}>{c.action}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:9,color:K.dim}}>Resolution: <span style={{fontWeight:600,color:K.tx}}>{c.resolution}</span></span>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:9,color:K.fnt}}>Confidence:</span>
                    <span style={{fontSize:11,fontWeight:700,color:c.confidence>=90?K.grn:c.confidence>=70?K.amb:K.red}}>{c.confidence}%</span>
                    <div style={{width:50}}><Prog pct={c.confidence} c={c.confidence>=90?K.grn:c.confidence>=70?K.amb:K.red} h={3}/></div>
                  </div>
                </div>
              </div>;
            })}
          </F>
        </Pnl>
      </F>}

      {/* ─── AUDIT PIPELINE ─── */}
      {sub==="Audit Pipeline"&&<F>
        <Pnl>
          <Hdr icon={Layers} t="Building a Data-Driven Audit Universe — 4-Step Pipeline" sub="Scope, Extract, Detect, Score — across all 5,200+ GL accounts" ac={K.sky}/>
          <G c="repeat(4,1fr)" g={14}>
            {auditPipeline.map(function(p){
              var c=[K.blu,K.grn,K.amb,K.vio][p.step-1];
              return <div key={p.step} style={{padding:16,borderRadius:12,border:"1px solid "+c+"22",background:c+"04"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:28,height:28,borderRadius:8,background:c+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:c}}>{p.step}</div>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:K.tx}}>{p.title}</div>
                    <div style={{fontSize:8,color:K.fnt}}>{p.items} GL accounts</div>
                  </div>
                </div>
                <div style={{fontSize:9,color:K.tx2,lineHeight:1.5,marginBottom:10}}>{p.desc}</div>
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:8,color:K.dim}}>Completion</span>
                    <span style={{fontSize:10,fontWeight:700,color:c}}>{p.status}%</span>
                  </div>
                  <Prog pct={p.status} c={c} h={5}/>
                </div>
                <div style={{fontSize:9,fontWeight:600,color:K.dim,marginBottom:4}}>Typical Anomalies</div>
                <F g={2}>{p.anomalies.map(function(a){return <div key={a} style={{fontSize:8,color:K.tx2,display:"flex",alignItems:"flex-start",gap:4}}><AlertTriangle size={9} color={K.amb} style={{marginTop:1,flexShrink:0}}/>{a}</div>;})}</F>
                <div style={{fontSize:9,fontWeight:600,color:K.dim,marginTop:8,marginBottom:4}}>Analytics</div>
                <F g={2}>{p.analytics.map(function(a){return <div key={a} style={{fontSize:8,color:K.tx2,display:"flex",alignItems:"flex-start",gap:4}}><Cpu size={9} color={c} style={{marginTop:1,flexShrink:0}}/>{a}</div>;})}</F>
                <div style={{fontSize:9,fontWeight:600,color:K.dim,marginTop:8,marginBottom:4}}>GenAI</div>
                <F g={2}>{p.genai.map(function(a){return <div key={a} style={{fontSize:8,color:K.tx2,display:"flex",alignItems:"flex-start",gap:4}}><Bot size={9} color={K.vio} style={{marginTop:1,flexShrink:0}}/>{a}</div>;})}</F>
              </div>;
            })}
          </G>
        </Pnl>
      </F>}

      {/* Detail Panel for MJE entries */}
      <DetailPanel open={!!selEntry} title={"Entry: "+((selEntry||{}).id||"")} onClose={function(){setSelMje(null);}}>
        {selEntry&&<F g={10}>
          <div style={{padding:12,borderRadius:8,background:(selEntry.riskScore>=80?K.red:selEntry.riskScore>=60?K.amb:K.grn)+"08",border:"1px solid "+(selEntry.riskScore>=80?K.red:selEntry.riskScore>=60?K.amb:K.grn)+"22"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <div><div style={{fontSize:10,color:K.dim}}>Risk Score</div><div style={{fontSize:28,fontWeight:700,color:selEntry.riskScore>=80?K.red:selEntry.riskScore>=60?K.amb:K.grn}}>{selEntry.riskScore}<span style={{fontSize:11,color:K.fnt}}> / 100</span></div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:10,color:K.dim}}>Benford Test</div><div style={{fontSize:20,fontWeight:700,color:selEntry.benford==="Fail"?K.red:K.grn}}>{selEntry.benford}</div></div>
            </div>
          </div>
          <G c="1fr 1fr" g={6}>
            {[["GL Account",selEntry.gl+" - "+selEntry.glName],["Amount","LKR "+(selEntry.amount).toLocaleString()],["User",selEntry.user],["Department",selEntry.dept],["Date",selEntry.date],["Time",selEntry.time+" ("+selEntry.day+")"],["Entry Type",selEntry.type],["Status",selEntry.status]].map(function(r){return <div key={r[0]} style={{padding:8,borderRadius:6,background:"#f8f9fc"}}><div style={{fontSize:8,color:K.fnt}}>{r[0]}</div><div style={{fontSize:12,fontWeight:600,color:K.tx}}>{r[1]}</div></div>;})}
          </G>
          {selEntry.flags.length>0&&<div>
            <div style={{fontSize:10,fontWeight:600,color:K.dim,marginBottom:6}}>Anomaly Flags</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{selEntry.flags.map(function(f){return <Bdg key={f} l={f} c={K.red}/>;})}</div>
          </div>}
          <div style={{padding:12,borderRadius:8,background:K.blu+"08",border:"1px solid "+K.blu+"22"}}>
            <div style={{fontSize:10,fontWeight:600,color:K.blu,marginBottom:4}}>AI Analysis</div>
            <div style={{fontSize:10,color:K.tx2,lineHeight:1.6}}>
              {selEntry.riskScore>=80?"HIGH RISK: This entry exhibits multiple fraud indicators. "+selEntry.flags.length+" anomaly flags triggered. Recommend immediate investigation by Internal Audit. The combination of "+selEntry.flags.join(", ")+" is a strong indicator of potential unauthorized activity.":
              selEntry.riskScore>=60?"MEDIUM RISK: Entry shows some unusual patterns. "+selEntry.flags.length+" flags detected. Recommend review by line manager before processing. Monitor user activity for recurring patterns.":
              "LOW RISK: Entry appears within normal operating parameters. No significant anomalies detected. Auto-cleared by risk scoring engine."}
            </div>
          </div>
        </F>}
      </DetailPanel>
    </F>
  );
}

/* ═══════════════════ MAIN ═══════════════════ */
var TABS=[{id:"proactive",label:"Proactive",icon:Shield,ac:K.grn,sub:"Predict & Prevent"},{id:"reactive",label:"Reactive",icon:AlertTriangle,ac:K.red,sub:"Detect & Respond"},{id:"feedback",label:"Feedback",icon:RotateCcw,ac:K.vio,sub:"Learn & Improve"},{id:"glaudit",label:"GL & MJE Audit",icon:FileText,ac:K.indigo,sub:"Journal Entry Testing"},{id:"operational",label:"Operational",icon:Briefcase,ac:K.blu,sub:"Day-to-Day Ops"},{id:"executive",label:"Executive",icon:Landmark,ac:K.amb,sub:"Board & C-Suite"}];

function App(){
  var _t=useState("proactive"),tab=_t[0],setTab=_t[1];
  var _n=useState(new Date()),now=_n[0],setNow=_n[1];
  useEffect(function(){var id=setInterval(function(){setNow(new Date());},1000);return function(){clearInterval(id);};},[]);
  return(
    <div style={{minHeight:"100vh",color:K.tx,background:K.bg,fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif"}}>
      <div style={{borderBottom:"1px solid "+K.border,padding:"12px 24px",background:"#fff"}}>
        <div style={{maxWidth:1360,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,"+K.grn+","+K.blu+","+K.vio+")"}}><Shield size={18} color="#fff"/></div><div><div style={{fontSize:15,fontWeight:700,letterSpacing:"-0.02em"}}>Audit Universe 2014 Risk Intelligence Platform</div><div style={{fontSize:8,color:K.fnt}}>End-to-End 2022 70+ AI Products 2022 6 Dashboard Layers</div></div></div>
          <div style={{display:"flex",alignItems:"center",gap:14}}><div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:7,background:K.grn+"0d",border:"1px solid "+K.grn+"22"}}><Dot c={K.grn} pulse/><span style={{fontSize:9,color:K.grn,fontWeight:600}}>LIVE</span></div><div style={{textAlign:"right"}}><div style={{fontSize:10,fontFamily:"monospace",color:K.dim}}>{now.toLocaleTimeString()}</div><div style={{fontSize:7,color:K.fnt}}>{now.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"short",day:"numeric"})}</div></div></div>
        </div>
      </div>
      <div style={{borderBottom:"1px solid "+K.border,padding:"0 24px",background:"#fff",overflowX:"auto"}}>
        <div style={{maxWidth:1360,margin:"0 auto",display:"flex",gap:2,paddingTop:6,paddingBottom:6}}>{TABS.map(function(t){var on=tab===t.id;var I=t.icon;return <button key={t.id} onClick={function(){setTab(t.id);}} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px",borderRadius:8,border:on?"1px solid "+t.ac+"33":"1px solid transparent",background:on?t.ac+"0a":"transparent",cursor:"pointer",transition:"all .15s",color:on?K.tx:K.dim,whiteSpace:"nowrap"}}><I size={14} color={on?t.ac:K.fnt}/><div style={{textAlign:"left"}}><div style={{fontSize:11,fontWeight:on?600:400}}>{t.label}</div><div style={{fontSize:7,color:K.fnt}}>{t.sub}</div></div></button>;})}</div>
      </div>
      <div style={{padding:"18px 24px",background:K.bg2,minHeight:"calc(100vh - 140px)"}}>
        <div style={{maxWidth:1360,margin:"0 auto"}}>{tab==="proactive"&&<ProactiveTab/>}{tab==="reactive"&&<ReactiveTab/>}{tab==="feedback"&&<FeedbackTab/>}{tab==="glaudit"&&<GLAuditTab/>}{tab==="operational"&&<OperationalTab/>}{tab==="executive"&&<ExecutiveTab/>}</div>
      </div>
      <div style={{borderTop:"1px solid "+K.border,padding:"8px 24px",background:"#fff"}}><div style={{maxWidth:1360,margin:"0 auto",display:"flex",justifyContent:"space-between",fontSize:7,color:K.fnt}}><span>Audit Universe v4.0 2014 6 Dashboard Layers 00b7 GL & MJE Full Population Testing 00b7 70+ AI Products</span><span>Advanced Analytics 2022 GenAI & Agentic AI 2022 Digital Tooling</span></div></div>
      <style>{"\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}\n"}</style>
    </div>
  );
}


/* === RENDER === */
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
