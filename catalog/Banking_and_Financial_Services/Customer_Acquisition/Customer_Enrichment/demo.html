<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#000}
button{cursor:pointer;font-family:inherit}

canvas{max-width:100%}

<body>
<div id="root"></div>
<script>
var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

var TABS = ["Overview","Segmentation","Pilot Performance","Use Cases","Data Quality","Tracking","Campaign Wizard","Campaigns"];

var C = {
  b1:"#0c2461",b2:"#1e3a8a",b3:"#1d4ed8",b4:"#3b82f6",b5:"#60a5fa",b6:"#93c5fd",b7:"#bfdbfe",
  p1:"#831843",p2:"#9d174d",p3:"#be185d",p4:"#ec4899",p5:"#f472b6",p6:"#f9a8d4",p7:"#fbcfe8",
  bg:"#ffffff",bd:"#e2e8f0",tx:"#000000",sub:"#334155",mu:"#64748b",lt:"#f1f5f9"
};

var SCOL = [C.b2, C.b4, C.p2, C.p4, C.b5, C.p6];
var BCOL = [C.b2, C.b4, C.p3, C.p5];

function fmt(n) {
  if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(1) + "B";
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1) + "M";
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + "K";
  return Math.round(n).toString();
}

function Card(props) {
  var st = {background:C.bg, borderRadius:12, padding:18, border:"1px solid "+C.bd};
  if (props.accent) st.borderTop = "3px solid " + props.accent;
  if (props.span) st.gridColumn = "span " + props.span;
  return e("div", {style:st},
    props.title ? e("div", {style:{fontSize:13,fontWeight:700,color:C.tx,marginBottom:12}}, props.title) : null,
    props.children
  );
}

function KPI(props) {
  var trendColor = props.trend === "up" ? C.b3 : props.trend === "down" ? C.p2 : C.mu;
  return e("div", {style:{textAlign:"center",padding:"10px 6px"}},
    e("div", {style:{fontSize:24,fontWeight:800,color:props.color || C.tx}}, props.value),
    e("div", {style:{fontSize:11,color:C.sub,marginTop:2}}, props.label),
    props.sub ? e("div", {style:{fontSize:10,color:trendColor,marginTop:2}}, props.sub) : null
  );
}

function Dot(props) {
  var col = C.mu;
  if (props.s === "live" || props.s === "completed") col = C.b3;
  if (props.s === "pilot" || props.s === "running") col = C.p3;
  if (props.s === "scheduled") col = C.b5;
  return e("span", {style:{display:"inline-block",width:8,height:8,borderRadius:"50%",background:col,marginRight:6}});
}

function Btn(props) {
  var bg = props.disabled ? C.lt : props.primary ? C.b2 : C.bg;
  var clr = props.disabled ? C.mu : props.primary ? "#fff" : C.tx;
  var pad = props.small ? "6px 14px" : "10px 20px";
  var fs = props.small ? 11 : 13;
  return e("button", {onClick:props.onClick, disabled:props.disabled, style:{padding:pad,borderRadius:8,border:props.primary?"none":"1px solid "+C.bd,background:bg,color:clr,fontSize:fs,fontWeight:600,cursor:props.disabled?"not-allowed":"pointer",opacity:props.disabled?0.6:1}}, props.children);
}

function ChartBox(props) {
  var canvasRef = useRef(null);
  var chartRef = useRef(null);
  var dataStr = JSON.stringify(props.data);

  useEffect(function() {
    if (chartRef.current) chartRef.current.destroy();
    var ctx = canvasRef.current.getContext("2d");
    var opts = props.options || {};
    var scales = {};
    if (opts.scales) {
      Object.keys(opts.scales).forEach(function(k) {
        var s = opts.scales[k];
        scales[k] = Object.assign({}, s, {
          ticks: Object.assign({}, s.ticks || {}, {color: C.tx, font: {size: 10}}),
          grid: {color: C.bd}
        });
      });
    }
    chartRef.current = new Chart(ctx, {
      type: props.type,
      data: props.data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: Object.assign({}, opts.plugins || {}, {
          legend: Object.assign({}, (opts.plugins || {}).legend || {}, {
            labels: {font: {size: 10}, color: C.tx}
          })
        }),
        scales: scales,
        indexAxis: opts.indexAxis
      }
    });
    return function() { if (chartRef.current) chartRef.current.destroy(); };
  }, [props.type, dataStr]);

  return e("div", {style:{height: props.h || 240}}, e("canvas", {ref: canvasRef}));
}

// ===== DATA =====

  {id:6, name:"Inactive Amex", pop:2179, desc:"No Amex usage", vf:"Both", col:SCOL[5]}
];
var TOTAL_IP = 84129;
var DELTA2 = [{cat:"Total AMEX Card",val:1.72},{cat:"Keells Spend",val:2.16},{cat:"Other Modern Trade",val:0.36},{cat:"Lodging Spend",val:8.25}];
var REDEM = [{w:"6-Oct",bd:5,cb:10},{w:"13-Oct",bd:10,cb:14},{w:"20-Oct",bd:14,cb:20},{w:"27-Oct",bd:15,cb:24},{w:"3-Nov",bd:14,cb:28},{w:"10-Nov",bd:10,cb:30},{w:"17-Nov",bd:5,cb:30}];

var WORKSTREAMS = [{w:"Data ingestion",o:"OCTAVE",s:"live",d:"Done",p:100},{w:"Identity resolution",o:"OCTAVE",s:"live",d:"Done",p:100},{w:"Segments",o:"OCTAVE",s:"live",d:"Done",p:100},{w:"UC1 Pilot (40K)",o:"OCTAVE+NTB",s:"pilot",d:"Q2'24",p:65},{w:"UC1 Scale",o:"OCTAVE+NTB",s:"planned",d:"Q3'24",p:20},{w:"UC2 Model Build",o:"OCTAVE",s:"pilot",d:"Q3'24",p:45},{w:"UC2 Activation",o:"NTB+JMSL",s:"planned",d:"Q3'24",p:15},{w:"Attribution",o:"OCTAVE",s:"pilot",d:"Ongoing",p:55},{w:"Steer Co",o:"All",s:"live",d:"Quarterly",p:100}];

var INIT_CAMPS = [
  {id:"CMP-001",nm:"Amex Spend Boost — Premium",uc:"Enrichment",ex:"NTB",ch:"SMS",sg:"S2+S5",au:12400,sn:12400,dl:11780,op:4120,cv:1240,st:"completed"},
  {id:"CMP-002",nm:"Dormant Amex Reactivation",uc:"Enrichment",ex:"NTB",ch:"App Notification",sg:"S6",au:2179,sn:2179,dl:1960,op:890,cv:218,st:"completed"},
  {id:"CMP-003",nm:"New Shopper Acquisition",uc:"Acquisition",ex:"Nexus",ch:"SMS",sg:"S3+S4",au:30051,sn:30051,dl:28548,op:8560,cv:2404,st:"running"},
  {id:"CMP-004",nm:"Cross-BU Retention HV",uc:"Enrichment",ex:"NTB",ch:"API",sg:"S5(HV)",au:8000,sn:8000,dl:7840,op:3920,cv:1120,st:"running"},
  {id:"CMP-005",nm:"Card Acq — Loyalists",uc:"Acquisition",ex:"NTB",ch:"SMS",sg:"S1",au:9644,sn:9644,dl:9160,op:3200,cv:772,st:"running"},
  {id:"CMP-006",nm:"Competitor Win-Back",uc:"Acquisition",ex:"Nexus",ch:"App Notification",sg:"S5(Comp)",au:20020,sn:0,dl:0,op:0,cv:0,st:"scheduled"},
  {id:"CMP-007",nm:"Holiday Basket Boost",uc:"Enrichment",ex:"Nexus",ch:"App Notification",sg:"S2",au:6115,sn:6115,dl:5870,op:2935,cv:917,st:"completed"},
  {id:"CMP-008",nm:"Premium Upsell",uc:"Enrichment",ex:"NTB",ch:"API",sg:"S2+S5(P)",au:5200,sn:5200,dl:5096,op:2548,cv:780,st:"completed"}
];

// ===== MAIN APP =====
function App() {
  var viewState = useState(0);
  var view = viewState[0];
  var setView = viewState[1];

  var campState = useState(INIT_CAMPS);
  var camps = campState[0];
  var setCamps = campState[1];

  // Wizard state
  var s1 = useState(0); var wStep = s1[0]; var setWStep = s1[1];
  var s2 = useState(null); var wSrc = s2[0]; var setWSrc = s2[1];
  var s3 = useState(null); var wFile = s3[0]; var setWFile = s3[1];
  var s4 = useState(false); var wVing = s4[0]; var setWVing = s4[1];
  var s5 = useState(false); var wVdone = s5[0]; var setWVdone = s5[1];
  var s6 = useState(false); var wMing = s6[0]; var setWMing = s6[1];
  var s7 = useState(false); var wMdone = s7[0]; var setWMdone = s7[1];
  var s8 = useState(""); var wName = s8[0]; var setWName = s8[1];
  var s9 = useState(null); var wChan = s9[0]; var setWChan = s9[1];
  var s10 = useState(null); var wExec = s10[0]; var setWExec = s10[1];
  var s11 = useState([]); var wSegs = s11[0]; var setWSegs = s11[1];
  var s12 = useState(null); var wUC = s12[0]; var setWUC = s12[1];
  var s13 = useState(false); var wDone = s13[0]; var setWDone = s13[1];

  var valData = {total: wSrc === "amex" ? 142680 : 168420, valid: wSrc === "amex" ? 138210 : 162890, invalid: wSrc === "amex" ? 4470 : 5530, complete: wSrc === "amex" ? 96.9 : 96.7};
  var mapData = {matched: 84129, nic: 36660, mobile: 39620, either: 50310, rate: 59.8};

  function doValidate() { setWVing(true); setTimeout(function() { setWVing(false); setWVdone(true); }, 2000); }
  function doMapping() { setWMing(true); setTimeout(function() { setWMing(false); setWMdone(true); }, 2500); }

  function launchCampaign() {
    var sz = Math.round(mapData.either * (0.15 + Math.random() * 0.35));
    var nc = {id:"CMP-"+String(camps.length+1).padStart(3,"0"), nm:wName||"New Campaign", uc:wUC||"Enrichment", ex:wExec||"NTB", ch:wChan||"SMS", sg:wSegs.join("+")||"All", au:sz, sn:0, dl:0, op:0, cv:0, st:"scheduled"};
    setCamps(camps.concat([nc]));
    setWDone(true);
  }

  function resetWiz() {
    setWStep(0); setWSrc(null); setWFile(null); setWVing(false); setWVdone(false);
    setWMing(false); setWMdone(false); setWName(""); setWChan(null); setWExec(null);
    setWSegs([]); setWUC(null); setWDone(false);
  }

  // === Helper components ===
  function SelCard(props) {
    var bg = props.sel ? (props.clr === C.b3 ? C.b7 : C.p7) : C.bg;
    return e("div", {onClick:props.onClick, style:{padding:18,borderRadius:12,border:"2px solid "+(props.sel?props.clr:C.bd),background:bg,cursor:"pointer",textAlign:"center"}},
      e("div",{style:{fontSize:28}}, props.icon),
      e("div",{style:{fontSize:13,fontWeight:700,color:C.tx,marginTop:6}}, props.title),
      e("div",{style:{fontSize:11,color:C.sub,marginTop:4}}, props.desc)
    );
  }

  function ChkBox(props) {
    return e("div", {onClick:props.onClick, style:{padding:10,borderRadius:8,border:"1.5px solid "+(props.sel?C.b3:C.bd),background:props.sel?C.b7:C.bg,cursor:"pointer",display:"flex",alignItems:"center",gap:8}},
      e("div",{style:{width:16,height:16,borderRadius:4,border:"2px solid "+(props.sel?C.b3:C.mu),background:props.sel?C.b3:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}, props.sel ? e("span",{style:{color:"#fff",fontSize:11,fontWeight:700}},"✓") : null),
      e("div",null,
        e("div",{style:{fontSize:11,fontWeight:600,color:C.tx}}, props.label),
        props.sub ? e("div",{style:{fontSize:10,color:C.mu}}, props.sub) : null
      )
    );
  }

  function ProgBar(props) {
    var bg = props.color || C.b3;
    if (props.status === "completed") bg = C.b3;
    else if (props.status === "running") bg = C.p3;
    else bg = C.mu;
    return e("div",{style:{background:C.lt,borderRadius:4,height:props.h||14,width:props.w||80,overflow:"hidden"}},
      e("div",{style:{height:"100%",borderRadius:4,width:props.pct+"%",background:bg,display:"flex",alignItems:"center",justifyContent:"center"}},
        e("span",{style:{fontSize:props.fs||8,fontWeight:700,color:"#fff"}}, props.pct+"%")
      )
    );
  }

  // ========== TAB RENDERERS ==========

  function renderOverview() {
    return e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}},
      e(Card,{span:4,accent:C.b2},
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8}},
          e(KPI,{label:"Intersection Pop.",value:fmt(TOTAL_IP),color:C.b2}),
          e(KPI,{label:"Pilot",value:"40K",color:C.b4,sub:"47.6%"}),
          e(KPI,{label:"PBT",value:"Rs.170M",color:C.b3,sub:"UC1+UC2",trend:"up"}),
          e(KPI,{label:"Non-Amex",value:"Rs.8B",color:C.p3}),
          e(KPI,{label:"MVP",value:"~10%",color:C.p4,sub:"vs 3%",trend:"up"}),
          e(KPI,{label:"Delta-2",value:"2.16%",color:C.b5,trend:"up"})
        )
      ),
      e(Card,{span:2,title:"Segmentation",accent:C.b3},
        e(ChartBox,{type:"doughnut",h:250,data:{labels:SEGS.map(function(s){return "S"+s.id}),datasets:[{data:SEGS.map(function(s){return s.pop}),backgroundColor:SCOL,borderWidth:1,borderColor:C.bg}]},options:{plugins:{legend:{position:"bottom",labels:{boxWidth:12}}}}})
      ),
      e(Card,{span:2,title:"Delta-2 Impact %",accent:C.p3},
        e(ChartBox,{type:"bar",h:250,data:{labels:DELTA2.map(function(d){return d.cat}),datasets:[{data:DELTA2.map(function(d){return d.val}),backgroundColor:BCOL,borderRadius:6}]},options:{indexAxis:"y",scales:{x:{max:10,ticks:{callback:function(v){return v+"%"}}}},plugins:{legend:{display:false}}}})
      ),
      e(Card,{span:2,title:"UC Value (PBT)",accent:C.b4},
        e(ChartBox,{type:"bar",h:200,data:{labels:["UC1: Enrichment","UC2: Acquisition"],datasets:[{data:[70,100],backgroundColor:[C.b3,C.p3],borderRadius:6}]},options:{scales:{y:{ticks:{callback:function(v){return "Rs."+v+"M"}}}},plugins:{legend:{display:false}}}})
      ),
      e(Card,{span:2,title:"Mapping Quality",accent:C.b5},
        e(ChartBox,{type:"bar",h:200,data:{labels:MAPQ.map(function(m){return m.t}),datasets:[{data:MAPQ.map(function(m){return m.r}),backgroundColor:[C.b2,C.b4,C.p3,C.p5],borderRadius:6}]},options:{scales:{y:{max:100,ticks:{callback:function(v){return v+"%"}}}},plugins:{legend:{display:false}}}})
      )
    );
  }

  function renderSegmentation() {
    return e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}},
      e(Card,{span:3,title:"Segments — "+fmt(TOTAL_IP)+" Total",accent:C.b2},
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}},
          SEGS.map(function(s,i) {
            var bgCol = s.vf==="Bank" ? C.b7 : s.vf==="Keells" ? C.p7 : C.b7;
            var txCol = s.vf==="Bank" ? C.b1 : s.vf==="Keells" ? C.p1 : C.b1;
            return e("div",{key:i,style:{padding:14,borderRadius:10,border:"1px solid "+C.bd,borderLeft:"4px solid "+s.col}},
              e("div",{style:{display:"flex",justifyContent:"space-between"}},
                e("span",{style:{fontSize:13,fontWeight:700,color:C.tx}},"S"+s.id),
                e("span",{style:{fontSize:18,fontWeight:800,color:s.col}},fmt(s.pop))
              ),
              e("div",{style:{fontSize:12,fontWeight:600,color:C.tx,marginTop:4}},s.name),
              e("div",{style:{fontSize:11,color:C.sub,marginTop:2}},s.desc),
              e("div",{style:{marginTop:8,display:"inline-block",fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:600,background:bgCol,color:txCol}},"Value: "+s.vf)
            );
          })
        )
      ),
      e(Card,{span:2,title:"S5 Share of Wallet",accent:C.p3},
        e(ChartBox,{type:"doughnut",h:220,data:{labels:["More at Keells","More at Competitors"],datasets:[{data:[16120,20020],backgroundColor:[C.b3,C.p3],borderWidth:1,borderColor:C.bg}]},options:{plugins:{legend:{position:"bottom"}}}})
      ),
      e(Card,{title:"Value Matrix",accent:C.b4},
        e("div",{style:{fontSize:11,color:C.tx,lineHeight:1.6}},
          e("div",{style:{padding:8,background:C.b7,borderRadius:6,marginBottom:6}},e("strong",{style:{color:C.b1}},"Bank:")," S1"),
          e("div",{style:{padding:8,background:C.p7,borderRadius:6,marginBottom:6}},e("strong",{style:{color:C.p1}},"Keells:")," S3, S4"),
          e("div",{style:{padding:8,background:C.lt,borderRadius:6}},e("strong",null,"Both:")," S2, S5, S6")

  function renderPilot() {
    return e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}},
      e(Card,{span:4,accent:C.p3},
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)"}},
          e(KPI,{label:"Pilot",value:"40K",color:C.b2}),
          e(KPI,{label:"MVP",value:"~10%",color:C.p3,sub:"vs 3%",trend:"up"}),

      ),
      e(Card,{span:2,title:"Delta-2 %",accent:C.b3},
        e(ChartBox,{type:"bar",h:260,data:{labels:DELTA2.map(function(d){return d.cat}),datasets:[{data:DELTA2.map(function(d){return d.val}),backgroundColor:BCOL,borderRadius:6}]},options:{scales:{y:{max:10,ticks:{callback:function(v){return v+"%"}}}},plugins:{legend:{display:false}}}})
      ),
      e(Card,{span:2,title:"Redemption Trajectory",accent:C.p3},
        e(ChartBox,{type:"line",h:260,data:{labels:REDEM.map(function(r){return r.w}),datasets:[{label:"Cashback",data:REDEM.map(function(r){return r.cb}),borderColor:C.p3,backgroundColor:C.p7+"80",fill:true,tension:0.3,borderWidth:2.5},{label:"Bill Discount",data:REDEM.map(function(r){return r.bd}),borderColor:C.b2,tension:0.3,borderWidth:2}]},options:{scales:{y:{max:35,ticks:{callback:function(v){return v+"%"}}}}}})

  function renderUseCases() {

      e(Card,{span:2,accent:C.b2},
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)"}},

      e(Card,{title:"UC1: Enrichment",accent:C.b3},

          e("div",{style:{height:"100%",borderRadius:8,background:C.b3,width:"65%",display:"flex",alignItems:"center",justifyContent:"center"}},

      ),
      e(Card,{title:"UC2: Acquisition",accent:C.p3},
        e("div",{style:{background:C.lt,borderRadius:8,height:24,overflow:"hidden",marginBottom:8}},
          e("div",{style:{height:"100%",borderRadius:8,background:C.p3,width:"30%",display:"flex",alignItems:"center",justifyContent:"center"}},
            e("span",{style:{fontSize:10,fontWeight:700,color:"#fff"}},"30%"))),
        e("div",{style:{fontSize:11,color:C.sub}},"Target: Rs.100M PBT")
      ),
      e(Card,{span:2,title:"Performance Radar",accent:C.b2},
        e(ChartBox,{type:"radar",h:280,data:{labels:["Spend Lift","New Cust","Retention","Basket","ROAS","Data Quality"],datasets:[{label:"UC1",data:[75,30,85,80,70,60],borderColor:C.b3,backgroundColor:C.b3+"20",borderWidth:2},{label:"UC2",data:[40,90,45,55,65,60],borderColor:C.p3,backgroundColor:C.p3+"20",borderWidth:2}]},options:{scales:{r:{min:0,max:100,ticks:{stepSize:25}}}}})

  function renderDataQuality() {
    return e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}},
      e(Card,{span:3,accent:C.b4},
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)"}},
          e(KPI,{label:"NIC",value:"43.5%",color:C.b2}),

    var sch = camps.filter(function(c){return c.st==="scheduled"});
    var totalSent = camps.reduce(function(a,c){return a+c.sn},0);
    var totalConv = camps.reduce(function(a,c){return a+c.cv},0);
    var avgHR = totalSent > 0 ? (totalConv/totalSent*100).toFixed(1) : "0";

    var chData = ["SMS","App Notification","API"].map(function(ch){
      var cs = camps.filter(function(c){return c.ch===ch});
      return {ch:ch, sn:cs.reduce(function(a,c){return a+c.sn},0), cv:cs.reduce(function(a,c){return a+c.cv},0)};
    });

      var cs = camps.filter(function(c){return c.ex===ex});

      var cv = cs.reduce(function(a,c){return a+c.cv},0);
      return {ex:ex, cnt:cs.length, sn:sn, cv:cv, hr:sn>0?(cv/sn*100).toFixed(1):"0"};

                e("td",{style:{padding:"8px 6px",fontWeight:600,color:C.b3}},c.id),
                e("td",{style:{padding:"8px 6px",color:C.tx,maxWidth:160}},c.nm),
                e("td",{style:{padding:"8px 6px"}},e("span",{style:{fontSize:10,padding:"2px 6px",borderRadius:6,background:c.uc==="Enrichment"?C.b7:C.p7,color:c.uc==="Enrichment"?C.b1:C.p1,fontWeight:600}},c.uc)),
                e("td",{style:{padding:"8px 6px"}},e("span",{style:{fontSize:10,padding:"2px 6px",borderRadius:6,background:c.ex==="NTB"?C.b7:C.p7,color:c.ex==="NTB"?C.b1:C.p1,fontWeight:600}},c.ex)),
                e("td",{style:{padding:"8px 6px",color:C.sub}},c.ch),
                e("td",{style:{padding:"8px 6px",color:C.sub,fontSize:10}},c.sg),
                e("td",{style:{padding:"8px 6px",fontWeight:600}},fmt(c.au)),
                e("td",{style:{padding:"8px 6px"}},c.dl>0?fmt(c.dl):"—"),
                e("td",{style:{padding:"8px 6px",fontWeight:600}},c.cv>0?fmt(c.cv):"—"),
                e("td",{style:{padding:"8px 6px",fontWeight:700,color:hrColor}},hr,hr!=="—"?"%":""),
                e("td",{style:{padding:"8px 6px"}},e(Dot,{s:c.st}),e("span",{style:{fontSize:10,color:C.sub}},c.st)),
                e("td",{style:{padding:"8px 6px"}},e(ProgBar,{pct:pr,status:c.st}))
              );
            }))
          )
        )
      ),
      e(Card,{span:4,title:"Campaign Funnel",accent:C.b4},
        e(ChartBox,{type:"bar",h:220,data:{labels:["Audience","Sent","Delivered","Opened","Converted"],datasets:[{data:[
          camps.reduce(function(a,c){return a+c.au},0),
          totalSent,
          camps.reduce(function(a,c){return a+c.dl},0),
          camps.reduce(function(a,c){return a+c.op},0),
          totalConv
        ],backgroundColor:[C.b2,C.b4,C.b5,C.p4,C.p2],borderRadius:6}]},options:{scales:{y:{ticks:{callback:function(v){return fmt(v)}}}},plugins:{legend:{display:false}}}})
      )
    );
  }

  // ===== MAIN RENDER =====
  var renderers = [renderOverview, renderSegmentation, renderPilot, renderUseCases, renderDataQuality, renderTracking, renderWizard, renderCampaigns];

  return e("div",{style:{maxWidth:960,margin:"0 auto",padding:20,background:C.bg,minHeight:"100vh"}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:20}},
      e("div",null,
        e("h1",{style:{fontSize:20,color:C.tx,margin:0}},"AMEX × NEXUS — Partnership Dashboard"),
        e("p",{style:{fontSize:12,color:C.sub,margin:"4px 0 0"}},"NTB × JMSL • Enabled by OCTAVE")
      ),
      e("div",{style:{textAlign:"right"}},
        e("div",{style:{fontSize:11,fontWeight:600,color:C.tx}},"Intersection Population"),
        e("div",{style:{fontSize:18,fontWeight:800,color:C.b2}},"84,129")
      )
    ),
    e("div",{style:{display:"flex",gap:5,marginBottom:20,flexWrap:"wrap"}},
      TABS.map(function(t,i){
        return e("button",{key:i,onClick:function(){setView(i)},style:{padding:"7px 12px",borderRadius:8,border:view===i?"none":"1px solid "+C.bd,fontSize:11,fontWeight:600,background:view===i?C.b2:C.bg,color:view===i?"#fff":C.sub,boxShadow:view===i?"0 2px 8px rgba(12,36,97,.3)":"0 1px 3px rgba(0,0,0,.06)"}},t);
      })
    ),
    renderers[view]()
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
